<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main class="container">
      <div class="card">
        <div class="card-image-container">
          <img
            src="./assets/images/illustration-article.svg"
            alt="illustration of a person reading an article"
            class="card-image"
          />
        </div>
        <p id="category">Learning</p>
        <p id="date">Published 21 Dec 2023</p>
        <h2 id="title">HTML & CSS foundations</h2>
        <p id="description">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
        <div class="author">
          <img
            src="./assets/images/image-avatar.webp"
            alt="Profile picture"
            id="author-image"
          />
          <p id="author-name">Greg Hooper</p>
        </div>
      </div>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://dawudasasfeh.github.io/">Dawud Alasasfeh</a>.
    </footer>
  </body>
</html>
